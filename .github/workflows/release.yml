name: Release

on:
  push:
    branches:
      - main
  # Keep manual tag-based trigger so scripts/release.ps1|sh still work too
  # (a tag push doesn't re-trigger the branch push event, so no double-run)

permissions:
  contents: write

jobs:
  auto-tag:
    name: Auto-bump version tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full tag history

      - name: Bump patch version and push tag
        id: bump
        run: |
          git fetch --tags
          LATEST=$(git tag --list "v*" --sort=-version:refname | head -1)
          LATEST="${LATEST:-v0.0.0}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
          PATCH=$((PATCH + 1))
          TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bumping $LATEST → $TAG"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    name: Build — ${{ matrix.target }}
    needs: auto-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
            exe: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
            exe: ".exe"
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x86_64
            exe: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-aarch64
            exe: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p core -p cli

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/core${{ matrix.exe }}  dist/rustboard-core-${{ matrix.suffix }}${{ matrix.exe }}
          cp target/${{ matrix.target }}/release/cli${{ matrix.exe }}   dist/rustboard-cli-${{ matrix.suffix }}${{ matrix.exe }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustboard-${{ matrix.suffix }}
          path: dist/

  build-plugin:
    name: Build WASM plugin
    needs: auto-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + wasm32-wasip1 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-wasm32-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-wasm32-

      - name: Build plugin-openai-tester WASM
        run: cargo build --release -p plugin-openai-tester --target wasm32-wasip1

      - name: Stage plugin artifact
        run: |
          mkdir -p dist
          cp target/wasm32-wasip1/release/plugin_openai_tester.wasm dist/plugin-openai-tester.wasm

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustboard-plugins
          path: dist/

  release:
    name: Create GitHub Release
    needs: [auto-tag, build, build-plugin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.auto-tag.outputs.tag }}
          name: Rustboard ${{ needs.auto-tag.outputs.tag }}
          body: |
            ## Rustboard ${{ needs.auto-tag.outputs.tag }}

            ### Install (Linux / macOS)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/meliani/Rustboard/main/install.sh | bash
            ```

            ### Install (Windows PowerShell)
            ```powershell
            irm https://raw.githubusercontent.com/meliani/Rustboard/main/install.ps1 | iex
            ```

            ### Manual download
            Pick the binary for your platform from the assets below.

            | Binary | Platform |
            |---|---|
            | `rustboard-core-linux-x86_64` | Linux x86_64 |
            | `rustboard-core-windows-x86_64.exe` | Windows x86_64 |
            | `rustboard-core-macos-x86_64` | macOS Intel |
            | `rustboard-core-macos-aarch64` | macOS Apple Silicon |

            ### Plugins
            Plugins are cross-platform WebAssembly modules — one file runs on every OS.

            | Plugin | Description |
            |---|---|
            | `plugin-openai-tester.wasm` | Tests OpenAI-compatible API keys |

            Install a plugin by copying it to the `plugins/bin/` directory next to the `core` binary.

            ### Run
            ```bash
            ./rustboard-core config/services.yaml
            ```
          draft: false
          prerelease: false
          files: dist/*
